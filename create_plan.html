<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Plan Form</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
        }

        form {
            max-width: 400px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
        }

        button {
            background-color: #9df9ef;
            color: #000;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Create Plan</h2>

<form method="post" action="process_create_plan.php">
    <label for="planName">Plan Name (Required):</label>
    <input type="text" name="planName" required>

    <label for="startDate">Start Date (Required):</label>
    <input type="date" name="startDate" required>

    <label for="hotelName">Hotel Name:</label>
    <input type="text" name="hotelName">

    <label for="budget">Budget:</label>
    <input type="text" name="budget">

    <label for="spentMoney">Spent Money:</label>
    <input type="text" name="spentMoney">

    <button type="submit">Create Plan</button>
</form>

</body>
</html>
